<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SPLATT. Bear | Created by You.</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0a0a0a;
        --pink: #ff2e93;
        --teal: #1fa8a0;
        --orange: #ff6b1a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 12%, rgba(255, 46, 147, 0.22), transparent 28rem),
          radial-gradient(circle at 82% 20%, rgba(31, 168, 160, 0.18), transparent 26rem),
          var(--bg);
        color: #fff;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100% - 24px, 1360px);
        margin: 0 auto;
        padding: 18px 0 28px;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
        font-size: clamp(1.8rem, 6vw, 3.5rem);
        font-weight: 1000;
        line-height: 1;
        letter-spacing: 0;
        text-shadow: 0 0 28px rgba(255, 46, 147, 0.35);
      }

      .brand span:nth-child(1),
      .brand span:nth-child(4),
      .brand span:nth-child(7) {
        color: var(--pink);
      }

      .brand span:nth-child(2),
      .brand span:nth-child(5) {
        color: var(--teal);
      }

      .brand span:nth-child(3),
      .brand span:nth-child(6) {
        color: var(--orange);
      }

      .layout {
        display: grid;
        gap: 20px;
        align-items: center;
      }

      .viewer-wrap {
        position: relative;
        min-height: min(78vh, 820px);
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 24px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.015)),
          #050505;
        box-shadow: 0 0 70px rgba(255, 46, 147, 0.16);
        touch-action: none;
      }

      .viewer-wrap canvas {
        cursor: grab;
        touch-action: none;
      }

      .viewer-wrap canvas:active {
        cursor: grabbing;
      }

      #viewer,
      #paint {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
      }

      #paint {
        pointer-events: none;
      }

      .loading {
        position: absolute;
        inset: 0;
        display: grid;
        place-items: center;
        color: rgba(255, 255, 255, 0.66);
        font-weight: 800;
        letter-spacing: 0;
      }

      .panel {
        display: grid;
        gap: 16px;
        padding-bottom: 10px;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.2rem, 6vw, 4.2rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .price {
        margin: 0;
        color: var(--teal);
        font-size: 1.7rem;
        font-weight: 1000;
      }

      .desc {
        margin: 0;
        color: rgba(255, 255, 255, 0.68);
        font-size: 1.1rem;
      }

      .palette {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .swatch {
        width: 42px;
        height: 42px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        cursor: pointer;
        transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      }

      .swatch:hover,
      .swatch.active {
        transform: translateY(-2px) scale(1.08);
        border-color: #fff;
        box-shadow: 0 0 24px color-mix(in srgb, var(--selected) 60%, transparent);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      button:not(.swatch),
      a.button {
        min-height: 48px;
        border: 0;
        border-radius: 999px;
        padding: 0 22px;
        color: #fff;
        cursor: pointer;
        font: inherit;
        font-weight: 900;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      }

      button:not(.swatch) {
        background: linear-gradient(90deg, var(--pink), var(--orange));
        box-shadow: 0 0 32px rgba(255, 46, 147, 0.24);
      }

      a.button {
        background: rgba(31, 168, 160, 0.92);
      }

      .viewer-tools {
        position: absolute;
        left: 16px;
        bottom: 16px;
        z-index: 20;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        pointer-events: auto;
      }

      .viewer-tools button {
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(255, 255, 255, 0.11);
        box-shadow: 0 12px 34px rgba(0, 0, 0, 0.32);
        backdrop-filter: blur(14px);
      }

      button:not(.swatch):hover,
      a.button:hover {
        transform: translateY(-2px);
      }

      @media (min-width: 920px) {
        .layout {
          grid-template-columns: minmax(0, 1.45fr) minmax(300px, 0.55fr);
        }

        .panel {
          padding-left: 8px;
        }
      }

      @media (max-width: 919px) {
        .viewer-wrap {
          min-height: 58vh;
        }
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
        }
      }
    </script>
  </head>
  <body>
    <main>
      <div class="brand" aria-label="SPLATT.">
        <span>S</span><span>P</span><span>L</span><span>A</span><span>T</span><span>T</span><span>.</span>
      </div>

      <section class="layout">
        <div class="viewer-wrap">
          <div class="viewer-tools">
            <button type="button" id="resetView">Reset view</button>
          </div>
          <div id="viewer"></div>
          <canvas id="paint"></canvas>
          <div class="loading" id="loading">Loading bear...</div>
        </div>

        <section class="panel">
          <h1>Splatt. Bear</h1>
          <p class="price">350 MAD</p>
          <p class="desc">Created by You.</p>

          <div class="palette" id="palette" aria-label="Color palette"></div>

          <div class="actions">
            <button type="button" id="pour">Pour the paint</button>
            <a class="button" id="whatsapp" href="#" target="_blank" rel="noreferrer">Order on WhatsApp</a>
          </div>
        </section>
      </section>
    </main>

    <script>
      window.addEventListener("error", (event) => {
        const loading = document.getElementById("loading");
        if (loading) loading.textContent = `Could not load 3D viewer: ${event.message}`;
      });

      window.addEventListener("unhandledrejection", (event) => {
        const loading = document.getElementById("loading");
        if (loading) loading.textContent = "Could not load 3D viewer. Refresh or check the network.";
        console.error(event.reason);
      });
    </script>

    <script type="module">
      import * as THREE from "three";
      import { OrbitControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/OrbitControls.js";
      import { STLLoader } from "https://unpkg.com/three@0.160.0/examples/jsm/loaders/STLLoader.js";

      const colors = ["#FF2E93", "#1FA8A0", "#FF6B1A", "#F1C40F", "#9B59B6", "#3498DB", "#F0F0F0", "#222222"];
      let selectedColor = "#F0F0F0";
      let bear = null;
      let introFloatStart = 0;
      let introFloatActive = false;

      const viewer = document.getElementById("viewer");
      const loading = document.getElementById("loading");
      const paintCanvas = document.getElementById("paint");
      const paintContext = paintCanvas.getContext("2d");
      const palette = document.getElementById("palette");
      const pourButton = document.getElementById("pour");
      const resetViewButton = document.getElementById("resetView");
      const whatsapp = document.getElementById("whatsapp");

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.up.set(0, 0, 1);
      camera.position.set(0, -6, 0.12);

      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.setClearColor(0x000000, 0);
      viewer.appendChild(renderer.domElement);

      const material = new THREE.MeshStandardMaterial({
        color: selectedColor,
        roughness: 0.52,
        metalness: 0.03
      });

      scene.add(new THREE.AmbientLight(0xffffff, 1.9));
      const directionalLight = new THREE.DirectionalLight(0xffffff, 2.1);
      directionalLight.position.set(4, 5, 6);
      scene.add(directionalLight);

      const controls = new OrbitControls(camera, renderer.domElement);
      controls.enableDamping = true;
      controls.dampingFactor = 0.045;
      controls.autoRotate = false;
      controls.enablePan = true;
      controls.panSpeed = 0.62;
      controls.rotateSpeed = 0.5;
      controls.zoomSpeed = 0.78;
      controls.minDistance = 1.8;
      controls.maxDistance = 12;
      controls.screenSpacePanning = true;

      function startIntroFloat() {
        introFloatStart = performance.now();
        introFloatActive = true;
        controls.autoRotate = true;
        controls.autoRotateSpeed = 0.18;
      }

      function stopIntroFloat() {
        introFloatActive = false;
        controls.autoRotate = false;
        controls.autoRotateSpeed = 0;
      }

      function resetView() {
        stopIntroFloat();
        camera.up.set(0, 0, 1);
        camera.position.set(0, -6, 0.12);
        controls.target.set(0, 0, 0.12);
        controls.update();
      }

      function updateWhatsapp() {
        const message = `Salam SPLATT., I want to order Splatt. Bear with selected color ${selectedColor}.`;
        whatsapp.href = `https://wa.me/212XXXXXXXXX?text=${encodeURIComponent(message)}`;
      }

      function resize() {
        const rect = viewer.getBoundingClientRect();
        renderer.setSize(rect.width, rect.height);
        camera.aspect = rect.width / rect.height;
        camera.updateProjectionMatrix();
        paintCanvas.width = Math.floor(rect.width * window.devicePixelRatio);
        paintCanvas.height = Math.floor(rect.height * window.devicePixelRatio);
        paintCanvas.style.width = `${rect.width}px`;
        paintCanvas.style.height = `${rect.height}px`;
        paintContext.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);
      }

      colors.forEach((color) => {
        const swatch = document.createElement("button");
        swatch.type = "button";
        swatch.className = "swatch";
        swatch.style.background = color;
        swatch.style.setProperty("--selected", color);
        swatch.setAttribute("aria-label", `Select ${color}`);
        if (color === selectedColor) swatch.classList.add("active");
        swatch.addEventListener("click", () => {
          selectedColor = color;
          material.color.set(color);
          document.querySelectorAll(".swatch").forEach((item) => item.classList.remove("active"));
          swatch.classList.add("active");
          updateWhatsapp();
        });
        palette.appendChild(swatch);
      });

      new STLLoader().load(
        "/products/bear.stl",
        (geometry) => {
          geometry.computeVertexNormals();
          bear = new THREE.Mesh(geometry, material);
          bear.castShadow = true;
          bear.receiveShadow = true;

          const box = new THREE.Box3().setFromObject(bear);
          const center = box.getCenter(new THREE.Vector3());
          const size = box.getSize(new THREE.Vector3()).length();
          bear.geometry.translate(-center.x, -center.y, -center.z);
          bear.scale.setScalar(4.6 / size);
          scene.add(bear);
          resetView();
          startIntroFloat();
          loading.style.display = "none";
        },
        (event) => {
          if (event.lengthComputable) {
            const progress = Math.round((event.loaded / event.total) * 100);
            loading.textContent = `Loading bear... ${progress}%`;
          }
        },
        (error) => {
          console.error(error);
          loading.textContent = "Could not load /products/bear.stl";
        }
      );

      const particles = [];

      function pourPaint() {
        const rect = viewer.getBoundingClientRect();
        for (let index = 0; index < 140; index += 1) {
          particles.push({
            x: rect.width * (0.22 + Math.random() * 0.56),
            y: -30 - Math.random() * 160,
            radius: 2 + Math.random() * 5,
            speed: 1.4 + Math.random() * 3.2,
            wobble: Math.random() * Math.PI * 2,
            color: Math.random() > 0.35 ? selectedColor : colors[Math.floor(Math.random() * colors.length)],
            life: 1
          });
        }
      }

      pourButton.addEventListener("click", pourPaint);
      resetViewButton.addEventListener("click", resetView);
      controls.addEventListener("start", stopIntroFloat);
      window.addEventListener("resize", resize);
      updateWhatsapp();
      resize();

      function animate() {
        requestAnimationFrame(animate);
        if (introFloatActive) {
          const elapsed = performance.now() - introFloatStart;
          if (elapsed < 2200) {
            controls.autoRotateSpeed = 0.18;
          } else if (elapsed < 3000) {
            controls.autoRotateSpeed = 0.18 * (1 - (elapsed - 2200) / 800);
          } else {
            stopIntroFloat();
          }
        }
        controls.update();
        renderer.render(scene, camera);

        const rect = viewer.getBoundingClientRect();
        paintContext.clearRect(0, 0, rect.width, rect.height);

        for (let index = particles.length - 1; index >= 0; index -= 1) {
          const particle = particles[index];
          particle.y += particle.speed;
          particle.x += Math.sin(particle.wobble + particle.y * 0.035) * 0.8;
          particle.life -= 0.006;

          paintContext.globalAlpha = Math.max(0, particle.life);
          paintContext.fillStyle = particle.color;
          paintContext.beginPath();
          paintContext.ellipse(particle.x, particle.y, particle.radius * 0.72, particle.radius * 1.8, 0, 0, Math.PI * 2);
          paintContext.fill();

          paintContext.beginPath();
          paintContext.moveTo(particle.x, particle.y);
          paintContext.lineTo(particle.x + Math.sin(particle.wobble) * 8, particle.y + particle.radius * 4);
          paintContext.lineWidth = Math.max(2, particle.radius * 0.42);
          paintContext.lineCap = "round";
          paintContext.strokeStyle = particle.color;
          paintContext.stroke();

          if (particle.y > rect.height + 80 || particle.life <= 0) particles.splice(index, 1);
        }

        paintContext.globalAlpha = 1;
      }

      animate();
    </script>
  </body>
</html>
